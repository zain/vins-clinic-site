<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>og</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Young+Serif&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body { margin: 0; padding: 0; }
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        color: oklch(0.22 0.018 180);
        background: oklch(0.94 0.035 82);
        position: relative;
      }
      .sea {
        /* Sea layer, painted over the sun so it reads as rising/setting */
        position: absolute;
        left: 0;
        top: 365px;
        width: 1200px;
        height: 265px;
        background: linear-gradient(
          to bottom,
          oklch(0.58 0.11 220) 0%,
          oklch(0.38 0.09 225) 100%
        );
        z-index: 2;
      }
      .sun {
        position: absolute;
        right: 96px;
        top: 58%;
        transform: translateY(-50%);
        width: 320px;
        height: 320px;
        background: oklch(0.74 0.145 52);
        border-radius: 50%;
        box-shadow: 0 0 0 2px oklch(0.56 0.11 45);
        z-index: 1;
      }
      .mark {
        position: absolute;
        left: 64px;
        top: 64px;
        display: flex;
        align-items: center;
        gap: 14px;
        z-index: 3;
      }
      .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: oklch(0.74 0.145 52);
      }
      .mark span {
        font-family: "Young Serif", serif;
        font-size: 32px;
        letter-spacing: -0.01em;
      }
      .headline {
        position: absolute;
        left: 64px;
        top: 176px;
        font-family: "Young Serif", serif;
        font-size: 96px;
        line-height: 1;
        letter-spacing: -0.03em;
        color: oklch(0.22 0.018 180);
        margin: 0;
        z-index: 3;
      }
      .headline em {
        font-style: italic;
        color: oklch(0.965 0.014 85);
      }
      .sub {
        position: absolute;
        left: 64px;
        bottom: 56px;
        font-size: 18px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: oklch(0.965 0.014 85);
        opacity: 0.92;
        z-index: 3;
      }
      .coord {
        position: absolute;
        right: 64px;
        top: 64px;
        text-align: right;
        font-size: 18px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: oklch(0.22 0.018 180);
        opacity: 0.75;
        line-height: 1.5;
        z-index: 3;
      }
      .east {
        position: absolute;
        right: 64px;
        bottom: 40px;
        font-size: 16px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: oklch(0.965 0.014 85);
        opacity: 0.85;
        z-index: 3;
      }
    </style>
  </head>
  <body>
    <div class="sea"></div>
    <div class="mark">
      <span class="dot"></span>
      <span>Vin&rsquo;s Clinic</span>
    </div>
    <div class="coord">
      33°53&prime;S · 151°16&prime;E<br />
      Bondi · NSW
    </div>
    <h1 class="headline">An<br />unhurried<br /><em>practice.</em></h1>
    <div class="sub">Dr Vinay Patel · By appointment · Bondi NSW</div>
    <div class="sun"></div>
    <div class="east">Looking east</div>
  </body>
</html>
